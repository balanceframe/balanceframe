name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  verify:
    name: Verify and publish
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    outputs:
      digest: ${{ steps.build.outputs.digest }}


    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@e50d5f73bfe71c2dd0aa4218de8f4afa59f8f81d # v16

      - name: Enable Nix binary cache
        uses: DeterminateSystems/magic-nix-cache-action@6221693898146dc97e38ad0e013488a16477a4c4 # v9

      - name: Validate the flake
        run: nix flake check --print-build-logs

      - name: Tag/version policy verification
        run: nix develop .#release --command just release-verify "$GITHUB_REF_NAME"

      - name: Install dependencies
        run: nix develop .#release --command pnpm install --frozen-lockfile

      - name: Build workspace
        run: nix develop .#release --command pnpm build

      - name: Typecheck workspace
        run: nix develop .#release --command pnpm typecheck

      - name: Lint workspace
        run: nix develop .#release --command pnpm lint

      - name: Run JavaScript and TypeScript tests
        run: nix develop .#release --command pnpm test

      - name: Run Rust tests
        run: nix develop .#release --command cargo test --workspace

      - name: Run Rust clippy
        run: nix develop .#release --command cargo clippy --workspace --all-targets -- -D warnings

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6f1783a6b1ef68f029b2c3d6aad5 # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for OCI tags
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/balanceframe
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push multi-platform image
        id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release assets
        env:
          TAG: ${{ github.ref_name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          nix develop .#release --command just release-assets "$TAG" "$DIGEST"

      - name: Construct full image reference
        id: imgref
        run: |
          echo "full=ghcr.io/${{ github.repository_owner }}/balanceframe@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Sign image with Cosign
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign "${{ steps.imgref.outputs.full }}" \
            --yes

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@2b5e44f70dbc9d1708e27c03f28c28b5b024c3a0 # v0.18.0
        with:
          image: ${{ steps.imgref.outputs.full }}
          artifact-name: sbom.spdx.json
          format: spdx-json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.1
        with:
          name: BalanceFrame ${{ github.ref_name }}
          body: |
            ## BalanceFrame ${{ github.ref_name }}

            Supported platforms: linux/amd64, linux/arm64

            ### Image reference
            ```
            ghcr.io/${{ github.repository_owner }}/balanceframe@${{ steps.build.outputs.digest }}
            ```

            ### Upgrade
            ```bash
            # Back up your data volume first, then:
            docker compose pull
            docker compose up -d
            ```

            ### Configuration
            See [docs/releases.md](https://github.com/${{ github.repository_owner }}/balanceframe/blob/${{ github.ref_name }}/docs/releases.md) for the SemVer and configuration stability policy.

            ### Assets
            - `compose.yaml` — canonical sidecar deployment
            - `compose.actual.yaml` — optional Actual Budget overlay
            - `.env.example` — environment template
            - `CHECKSUMS` — SHA-256 checksums for all assets
            - `sbom.spdx.json` — SPDX SBOM
          files: |
            _release/${{ github.ref_name }}/compose.yaml
            _release/${{ github.ref_name }}/compose.actual.yaml
            _release/${{ github.ref_name }}/.env.example
            _release/${{ github.ref_name }}/CHECKSUMS
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ---------------------------------------------------------------------------
  # SLSA provenance — reusable workflow, must be a separate job
  # ---------------------------------------------------------------------------
  generate-slsa:
    needs: verify
    permissions:
      id-token: write
      contents: read
      packages: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@b0a6aefd8e3b70e0fb4f8c2e45a7bd2ddc569548 # v2.1.0
    with:
      image: ghcr.io/${{ github.repository_owner }}/balanceframe
      digest: ${{ needs.verify.outputs.digest }}
