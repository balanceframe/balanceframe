name: Test

on:
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    name: Linux x86_64 (full suite)
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix binary cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Validate the flake and development shell
        run: nix flake check --print-build-logs

      - name: Install dependencies
        run: nix develop --command pnpm install --frozen-lockfile

      - name: Build workspace
        run: nix develop --command pnpm build

      - name: Typecheck workspace
        run: nix develop --command pnpm typecheck

      - name: Lint workspace
        run: nix develop --command pnpm lint

      - name: Run JavaScript and TypeScript tests
        run: nix develop --command pnpm test

      - name: Run Rust tests
        run: nix develop --command cargo test --workspace

      - name: Run code coverage
        run: nix develop --command just coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 14

      - name: Run Rust clippy
        run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings

  portable:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x86_64
            runner: macos-15-intel
          - name: macOS ARM64
            runner: macos-14
          - name: Windows x86_64
            runner: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Lint workspace
        run: pnpm lint

      - name: Run portable JavaScript and TypeScript tests
        run: |
          pnpm --filter @balanceframe/actual-adapter test
          pnpm --filter @balanceframe/application test
          pnpm --filter @balanceframe/cli test
          pnpm --filter @balanceframe/test-contract test

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
