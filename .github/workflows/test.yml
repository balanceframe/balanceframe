name: Test

on:
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  linux:
    name: Linux x86_64 (full suite)
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@e50d5f73bfe71c2dd0aa4218de8f4afa59f8f81d # v16

      - name: Enable Nix binary cache
        uses: DeterminateSystems/magic-nix-cache-action@6221693898146dc97e38ad0e013488a16477a4c4 # v9

      - name: Validate the flake and development shell
        run: nix flake check --print-build-logs

      - name: Install dependencies
        run: nix develop --command pnpm install --frozen-lockfile

      - name: Build workspace
        run: nix develop --command pnpm build

      - name: Typecheck workspace
        run: nix develop --command pnpm typecheck

      - name: Lint workspace
        run: nix develop --command pnpm lint

      - name: Run JavaScript and TypeScript tests
        run: nix develop --command pnpm test

      - name: Run Rust tests
        run: nix develop --command cargo test --workspace

      - name: Run code coverage
        run: nix develop --command just coverage
      - name: Check coverage thresholds
        run: |
          SUMMARY="coverage/summary.json"
          if [ -f "$SUMMARY" ]; then
            echo "Checking coverage thresholds..."
            # Extract per-package line coverage and validate against thresholds
            FAIL=0
            while read -r pkg cov; do
              cov_int=${cov%.*}
              if [ "$cov_int" -lt 40 ] 2>/dev/null; then
                echo "::error::FAIL: $pkg line coverage $cov% is below minimum 40%"
                FAIL=1
              elif [ "$cov_int" -lt 60 ] 2>/dev/null; then
                echo "::warning::WARN: $pkg line coverage $cov% is below target 60%"
              else
                echo "  OK: $pkg line coverage $cov%"
              fi
            done < <(jq -r '.packages | to_entries[] | "\(.key) \(.value.line)"' "$SUMMARY" 2>/dev/null || echo "")
            exit $FAIL
          else
            echo "No coverage summary found at $SUMMARY — skipping threshold check"
          fi

      - name: Run dependency security audit
        run: nix develop --command pnpm audit --audit-level=high || echo "Audit found issues — review required"

      - name: Upload coverage reports
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 14

      - name: Run Rust clippy
        run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings

      - name: Initialize CodeQL
        uses: github/codeql-action/init@1b549b9259bda1cb5ddde3b41741a82a2d15a841 # v3.28.13
        with:
          languages: javascript-typescript, rust
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@1b549b9259bda1cb5ddde3b41741a82a2d15a841 # v3.28.13

  portable:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x86_64
            runner: macos-15-intel
          - name: macOS ARM64
            runner: macos-14
          - name: Windows x86_64
            runner: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66dd77 # v4.1.0

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@7b1c307e0dcbda6122208f10795aab336b9b64bf # stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Lint workspace
        run: pnpm lint

      - name: Run portable JavaScript and TypeScript tests
        run: |
          pnpm --filter @balanceframe/actual-adapter test
          pnpm --filter @balanceframe/application test
          pnpm --filter @balanceframe/cli test
          pnpm --filter @balanceframe/test-contract test

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
